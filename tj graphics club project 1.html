<!DOCTYPE html>
<html>

<body>
    <canvas id="gcCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gcCanvas");
        const gl = canvas.getContext("webgl");

        gl.viewport(0, 0, canvas.width, canvas.height);

        const vsSource = `
            attribute vec3 position;

            uniform mat4 projection;
            uniform mat4 rotation;

            void main(void) {
                gl_Position = projection * rotation * vec4(position, 1.0);
            }
        `;

        const fsSource = `
            precision mediump float;
            

            void main(void) {
                gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);
            }
        `;

        function compileShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = compileShader(gl.VERTEX_SHADER, vsSource);
        const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }
        gl.useProgram(program);

        function perspective(fov, aspect, near, far) {
            const f = 1.0 / Math.tan(fov / 2);
            const nf = 1 / (near - far);

            return new Float32Array([
                f / aspect, 0, 0, 0,
                0, f, 0, 0,
                0, 0, (far + near) * nf, -1,
                0, 0, (2 * far * near) * nf, 0
            ]);
        }

        const projectionMatrix = perspective(
            45 * Math.PI / 180, 
            canvas.width / canvas.height, 
            0.1, 
            100.0
        );

        function rotationY(angle) {
            const c = Math.cos(angle);
            const s = Math.sin(angle);

            return new Float32Array([
                c, 0,  s, 0,
                0, 1,  0, 0,
                -s, 0,  c, 0,
                0, 0,  0, 1
            ]);
        }

        const projectionLocation = gl.getUniformLocation(program, "projection");
        gl.uniformMatrix4fv(projectionLocation, false, projectionMatrix);

        const rotationLocation = gl.getUniformLocation(program, "rotation");

        const vertices = new Float32Array([
        -0.3,  0.5, -2.0,
        -0.8, -0.5, -2.0,
         0.2, -0.5, -2.0
        ]);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const FSIZE = vertices.BYTES_PER_ELEMENT;

        const position = gl.getAttribLocation(program, "position");
        gl.vertexAttribPointer(position, 3, gl.FLOAT, false, 0, 0);
        gl.enableVertexAttribArray(position);


        gl.enable(gl.DEPTH_TEST);
        gl.depthFunc(gl.LEQUAL);
        gl.clearDepth(1.0);

        gl.clearColor(1, 1, 1, 1);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        let angle = 0;

            function render() {
                angle += 0.01;

                const rotationMatrix = rotationY(angle);
                gl.uniformMatrix4fv(rotationLocation, false, rotationMatrix);

                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 3);

                requestAnimationFrame(render);
            }

            render();
    </script>
</body>

</html>
