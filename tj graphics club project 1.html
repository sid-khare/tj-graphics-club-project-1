<!DOCTYPE html>
<html>

<body>
    <canvas id="gcCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gcCanvas");
        const gl = canvas.getContext("webgl");

        gl.viewport(0, 0, canvas.width, canvas.height);

        
        const vsSource = ` 
            attribute vec3 position;
            attribute vec3 color;
            varying vec3 vColor;

            void main(void) {
                gl_Position = vec4(position, 1.0);
                vColor = color;
            }
        `;

        const fsSource = `
            precision mediump float;
            varying vec3 vColor;

            void main(void) {
                gl_FragColor = vec4(vColor, 1.0);
            }
        `;

        function compileShader(type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error(gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const vertexShader = compileShader(gl.VERTEX_SHADER, vsSource);
        const fragmentShader = compileShader(gl.FRAGMENT_SHADER, fsSource);

        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);

        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
            console.error(gl.getProgramInfoLog(program));
        }
        gl.useProgram(program);

        
        const vertices = new Float32Array([
        -0.3,  0.5,  0.5,   0.0, 1.0, 0.0,
        -0.8, -0.5,  0.5,   0.0, 1.0, 0.0,
         0.2, -0.5,  0.5,   0.0, 1.0, 0.0,

         0.3,  0.5, -0.5,   1.0, 0.0, 0.0,
         -0.2, -0.5, -0.5,   1.0, 0.0, 0.0,
          0.8, -0.5, -0.5,   1.0, 0.0, 0.0
        ]);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

        const FSIZE = vertices.BYTES_PER_ELEMENT;

        const position = gl.getAttribLocation(program, "position");
        gl.vertexAttribPointer(position, 3, gl.FLOAT, false, FSIZE * 6, 0);
        gl.enableVertexAttribArray(position);

        const color = gl.getAttribLocation(program, "color");
        gl.vertexAttribPointer(color, 3, gl.FLOAT, false, FSIZE * 6, FSIZE * 3);
        gl.enableVertexAttribArray(color);

        gl.enable(gl.DEPTH_TEST);
        gl.depthFunc(gl.LEQUAL);
        gl.clearDepth(1.0);

        gl.clearColor(1, 1, 1, 1);
        gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

        gl.drawArrays(gl.TRIANGLES, 0, vertices.length / 6);

    </script>
</body>

</html>
